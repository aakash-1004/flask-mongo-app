<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Flask MongoDB App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 18px; outline: none; transition: border 0.2s; }
        input:focus, textarea:focus { border-color: #4f46e5; }
        textarea { resize: vertical; min-height: 100px; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #4338ca; }
        .error { background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; border-left: 4px solid #dc2626; }
        .api-link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .api-link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Submit Your Info</h1>
        <p class="subtitle">Data will be stored in MongoDB Atlas</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/submit">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Aakash Rao" />

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="aakash@example.com"/>

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write something..."></textarea>

            <button type="submit">Submit</button>
        </form>

        <div class="api-link">
            Test the API: <a href="/api" target="_blank">/api</a>
        </div>
    </div>
</body>
</html>
