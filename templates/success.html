<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Success</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 48px 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 420px; width: 100%; }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #166534; margin-bottom: 12px; }
        p { color: #666; font-size: 14px; margin-bottom: 28px; }
        a { display: inline-block; padding: 12px 28px; background: #4f46e5; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; }
        a:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Data submitted successfully</h1>
        <p>Your information has been saved to MongoDB Atlas.</p>
        <a href="/">Submit Another</a>
    </div>
</body>
</html>
